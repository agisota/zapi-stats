services:
  stats:
    build: .
    container_name: zapi-stats
    restart: unless-stopped
    ports:
      - "127.0.0.1:20129:20129"
    volumes:
      - /data/omniroute:/data/omniroute:ro
      - /srv/service-state/apps/zapi-stats/state:/data/zapi-stats-state
    environment:
      - PORT=20129
      - DB_PATH=/data/omniroute/storage.sqlite
      - LOGS_PATH=/data/omniroute/call_logs
      - ACCOUNT_DB_PATH=/data/zapi-stats-state/account.sqlite
      - NODE_ENV=production
      - ACCOUNT_ENFORCE_BALANCE=1
      - CORS_ALLOWED_ORIGINS=https://stats.api.zed.md
      # Optional live adapters:
      # - OMNIROUTE_RW_DB_PATH=/data/omniroute/storage.sqlite
      # - DVNET_API_BASE_URL=https://payments.example.com
      # - DVNET_API_KEY=${DVNET_API_KEY}
      # - DVNET_WEBHOOK_SECRET=${DVNET_WEBHOOK_SECRET}
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:20129/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
